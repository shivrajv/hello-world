<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World App</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem 1rem;
      box-sizing: border-box;
      background: #f4f6fb;
      color: #1a1a2e;
    }

    h1 {
      margin: 0.5rem 0 1rem;
      text-align: center;
    }

    /* Sliding phrase carousel */
    .carousel-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 1.25rem;
    }

    .carousel-hint {
      font-size: 0.8rem;
      color: #777;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .carousel {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 0.25rem 0.1rem 0.6rem;
      scrollbar-width: thin;
    }

    .chip {
      flex: 0 0 auto;
      scroll-snap-align: center;
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      border: 2px solid #ccc;
      background: #fff;
      color: #1a1a2e;
      white-space: nowrap;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s ease;
    }

    .chip.selected {
      border-color: #4361ee;
      background: #eaf0ff;
      color: #4361ee;
      font-weight: 600;
    }

    /* Style controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      width: 100%;
      max-width: 420px;
      margin-bottom: 1.5rem;
    }

    .control {
      display: flex;
      flex-direction: column;
      flex: 1 1 120px;
    }

    .control label {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #555;
    }

    select {
      font-size: 1rem;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      color: #1a1a2e;
    }

    .buttons {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    button {
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      transition: opacity 0.15s ease;
    }

    button:active {
      opacity: 0.8;
    }

    #helloBtn {
      background: #4361ee;
    }

    #clearBtn {
      background: #e63946;
    }

    #output {
      font-weight: 600;
      min-height: 3rem;
      text-align: center;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>Hello World App</h1>

  <div class="carousel-wrap">
    <div class="carousel-hint">Swipe and tap to pick a phrase</div>
    <div class="carousel" id="carousel"></div>
  </div>

  <div class="controls">
    <div class="control">
      <label for="colorSelect">Color</label>
      <select id="colorSelect">
        <option value="#4361ee">Blue</option>
        <option value="#e63946">Red</option>
        <option value="#2a9d8f">Green</option>
        <option value="#9d4edd">Purple</option>
        <option value="#f77f00">Orange</option>
      </select>
    </div>

    <div class="control">
      <label for="fontSelect">Font</label>
      <select id="fontSelect">
        <option value="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">Sans-serif</option>
        <option value="Georgia, 'Times New Roman', serif">Serif</option>
        <option value="'Courier New', monospace">Monospace</option>
        <option value="'Brush Script MT', cursive">Cursive</option>
        <option value="Impact, 'Arial Black', sans-serif">Bold Display</option>
      </select>
    </div>

    <div class="control">
      <label for="sizeSelect">Size</label>
      <select id="sizeSelect">
        <option value="1.5rem">Small</option>
        <option value="2rem" selected>Medium</option>
        <option value="3rem">Large</option>
        <option value="4rem">X-Large</option>
      </select>
    </div>
  </div>

  <div class="buttons">
    <button id="helloBtn">Hello World</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div id="output"></div>

  <script>
    const output = document.getElementById("output");
    const colorSelect = document.getElementById("colorSelect");
    const fontSelect = document.getElementById("fontSelect");
    const sizeSelect = document.getElementById("sizeSelect");
    const helloBtn = document.getElementById("helloBtn");
    const carousel = document.getElementById("carousel");

    // Pool of short phrases; up to 7 are shown (shuffled) on each page load
    const PHRASE_POOL = [
      "Hello World",
      "Good Morning",
      "Welcome",
      "Thank You",
      "Congratulations",
      "Happy Birthday",
      "Cheers",
      "Well Done",
      "Good Luck",
      "Stay Awesome"
    ];
    const MAX_PHRASES = 7;

    let selectedPhrase = "Hello World";

    // Fisher-Yates shuffle, then take up to MAX_PHRASES
    function pickPhrases() {
      const pool = PHRASE_POOL.slice();
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      return pool.slice(0, MAX_PHRASES);
    }

    // Always fully replace the output text so no previous text lingers
    function setOutput(text) {
      output.textContent = "";   // clear any existing text first
      output.textContent = text; // then set the new value
    }

    // Apply the current control selections to the output text
    function applyStyles() {
      output.style.color = colorSelect.value;
      output.style.fontFamily = fontSelect.value;
      output.style.fontSize = sizeSelect.value;
    }

    // Make a phrase the active selection
    function selectPhrase(phrase, chipEl) {
      selectedPhrase = phrase;
      helloBtn.textContent = phrase; // blue button shows the chosen phrase
      setOutput("");                 // clear stale text from a previous phrase
      carousel.querySelectorAll(".chip").forEach(c => c.classList.remove("selected"));
      if (chipEl) chipEl.classList.add("selected");
    }

    // Build the carousel
    function buildCarousel() {
      const phrases = pickPhrases();
      carousel.innerHTML = "";
      phrases.forEach((phrase, idx) => {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";
        chip.textContent = phrase;
        chip.addEventListener("click", () => selectPhrase(phrase, chip));
        carousel.appendChild(chip);
        if (idx === 0) selectPhrase(phrase, chip); // default to first phrase
      });
    }

    // Live-update styling whenever a control changes
    colorSelect.addEventListener("change", applyStyles);
    fontSelect.addEventListener("change", applyStyles);
    sizeSelect.addEventListener("change", applyStyles);

    helloBtn.addEventListener("click", () => {
      setOutput(selectedPhrase);
      applyStyles();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      setOutput("");
    });

    // Initialize
    buildCarousel();
    applyStyles();
  </script>
</body>
</html>
